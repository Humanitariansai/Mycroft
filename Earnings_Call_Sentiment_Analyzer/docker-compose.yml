services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: earnings_sentiment
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d earnings_sentiment"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: sentiment
      RABBITMQ_DEFAULT_PASS: sentiment
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 15
    restart: unless-stopped

  backend:
    build: ./backend
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/earnings_sentiment
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: sentiment
      RABBITMQ_PASSWORD: sentiment
      UPLOAD_DIR: /uploads
    ports:
      - "8080:8080"
    volumes:
      - transcript_uploads:/uploads
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  worker:
    build: ./worker
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: earnings_sentiment
      DB_USER: postgres
      DB_PASSWORD: postgres
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: sentiment
      RABBITMQ_PASSWORD: sentiment
      UPLOAD_DIR: /uploads
      MODEL_NAME: ProsusAI/finbert
      MODEL_BATCH_SIZE: 16
    volumes:
      - transcript_uploads:/uploads:ro
      - huggingface_cache:/models/huggingface
    depends_on:
      backend:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  rabbitmq_data:
  transcript_uploads:
  huggingface_cache:
