spring:
  application:
    name: earnings-sentiment-api
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/earnings_sentiment}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    publisher-confirm-type: simple
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 11MB

server:
  port: 8080
  error:
    include-message: never

app:
  upload-dir: ${UPLOAD_DIR:./uploads}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
