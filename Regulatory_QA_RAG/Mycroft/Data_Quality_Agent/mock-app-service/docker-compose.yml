services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: mock
      POSTGRES_PASSWORD: mock
      POSTGRES_DB: mock
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mock -d mock"]
      interval: 2s
      timeout: 5s
      retries: 20

  app:
    build: .
    environment:
      DATABASE_URL: postgresql+psycopg2://mock:mock@postgres:5432/mock
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./:/app

volumes:
  postgres-data:
